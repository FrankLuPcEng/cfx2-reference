name: Generate Version

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version.json
        run: |
          VERSION=$(git describe --tags --always --abbrev=7 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +"%Y-%m-%d")
          BUILD=$(date -u +"%s")
          cat > data/version.json <<EOF
          {
            "version": "$VERSION",
            "commit": "$COMMIT",
            "date": "$DATE",
            "build": $BUILD
          }
          EOF

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/version.json
          if git diff --cached --quiet; then
            echo "No changes to version.json"
          else
            git commit -m "chore: update version.json [skip ci]"
            git push
          fi
