<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFX 2.0 Message Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="sidebar">
  <header>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><h1>CFX 2.0 Reference</h1><p>IPC-CFX-2591 · SMT Message Guide</p></div>
      <button id="theme-toggle" title="切換深色/亮色模式" aria-label="Toggle dark mode">☀</button>
    </div>
  </header>
  <div id="mode-toggle">
    <button class="mtbtn active" data-mode="flows">流程</button>
    <button class="mtbtn" data-mode="messages">訊息</button>
    <button class="mtbtn" data-mode="machines">機台</button>
    <button class="mtbtn" data-mode="scenarios">情境</button>
  </div>
  <div id="search-wrap"><input id="search" placeholder="搜尋流程…"></div>
  <div id="flow-list"></div>
</div>
<div id="main">
  <div id="topbar">
    <div style="flex:1"><h2 id="ftitle">選擇左側流程</h2><p id="fdesc">← 選擇 SMT 流程以查看 CFX 2.0 訊息循序圖</p></div>
    <span id="fbadge" class="badge" style="display:none"></span>
  </div>
  <div class="filter-bar" id="fbar" style="display:none">
    <span style="font-size:10px;color:var(--text3);margin-right:4px">顯示：</span>
    <button class="fbtn active" data-filter="all">全部</button>
    <button class="fbtn" data-filter="request">Request</button>
    <button class="fbtn" data-filter="response">Response</button>
    <button class="fbtn" data-filter="event">Event</button>
  </div>
  <div id="content">
    <div id="seq-panel">
      <div id="empty-state"><div class="ico">⬡</div><p style="font-size:13px;line-height:1.9">選擇左側的 SMT 流程<br>查看 CFX 2.0 訊息交握循序圖</p></div>
      <div id="seqc"></div>
    </div>
    <div id="detail-panel" class="hidden"><div id="di"><p style="color:var(--text3);font-size:12px;padding:10px 0">點擊循序圖中的訊息查看格式規範</p></div></div>
  </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
